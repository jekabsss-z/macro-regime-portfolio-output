<style>
  :root{--navy:#0f2a4a;--navy2:#1b3f6b;--blue:#2f6fb3;--ink:#1c2733;--mut:#6b7a8d;--line:#e3e9f0;--bg:#eef3f9;--card:#fff;

  *{box-sizing:border-box}
  body{margin:0;font-family:-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;color:var(--ink);background:var(--bg);font-size:14px;line-height:1.45}
  header{background:linear-gradient(120deg,var(--navy),var(--navy2));color:#fff;padding:16px 24px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px}
  header h1{margin:0;font-size:18px;font-weight:650}
  header .sub{color:#b9cce4;font-size:12px;margin-top:3px}
  .wrap{max-width:1300px;margin:0 auto;padding:18px 24px 70px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:16px 18px;box-shadow:0 1px 2px rgba(16,42,74,.04);margin-bottom:16px}
  .row{display:flex;flex-wrap:wrap;gap:10px;align-items:center}.between{justify-content:space-between}
  .muted{color:var(--mut)}.sig{font-size:12px}
  button,select,input{font-family:inherit}
  select,input[type=text]{font-size:13px;border:1px solid var(--line);border-radius:6px;padding:5px 8px;background:#fff}
  .tbtn{font-family:var(--mono);font-size:12px;letter-spacing:.5px;border:1px solid var(--line);background:#fff;border-radius:8px;padding:6px 12px;cursor:pointer;color:var(--ink)}
  .tbtn.on{background:var(--ink);color:#fff;border-color:var(--ink)}
  .sect{font-family:var(--mono);text-transform:uppercase;letter-spacing:1.5px;font-size:11.5px;color:var(--mut);display:flex;align-items:center;gap:10px;margin:2px 0 12px;font-weight:600}
  .sect::before{content:"";display:inline-block;width:24px;height:2px;background:var(--gold);flex:none}
  .chartsvg text{font-family:var(--mono)}
  .plegend{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:8px}
  .plegend button{font-family:var(--mono);font-size:12px;border:1px solid var(--line);background:#fff;border-radius:20px;padding:5px 12px;cursor:pointer;display:inline-flex;align-items:center;gap:8px;color:var(--ink)}
  .plegend button .dot{width:16px;height:3px;border-radius:2px;display:inline-block}
  .plegend button .val{color:var(--mut);font-size:11px}
  .plegend button.off{opacity:.4}
  table.metrics{width:100%;border-collapse:collapse;font-size:13px}
  table.metrics th{font-family:var(--mono);text-transform:uppercase;letter-spacing:.5px;font-size:10.5px;color:var(--mut);font-weight:600;text-align:right;padding:8px 12px;border-bottom:1px solid var(--line)}
  table.metrics th:first-child{text-align:left}
  table.metrics td{padding:11px 12px;text-align:right;border-bottom:1px solid var(--line);font-variant-numeric:tabular-nums}
  table.metrics td:first-child{text-align:left;font-weight:600}
  table.metrics tr.reco{background:#faf5e6}
  .recobadge{font-family:var(--mono);font-size:9.5px;letter-spacing:.5px;border:1px solid var(--gold);color:var(--gold);border-radius:4px;padding:1px 6px;margin-left:8px;text-transform:uppercase}
  .statgrid{display:grid;grid-template-columns:repeat(6,1fr);gap:10px}
  .stat{background:#f5f9fd;border:1px solid var(--line);border-radius:8px;padding:10px}
  .stat .v{font-size:20px;font-weight:700;color:var(--navy)}.stat .l{font-size:10.5px;color:var(--mut)}
  .flex2{display:grid;grid-template-columns:1fr 1fr;gap:16px}@media(max-width:900px){.flex2{grid-template-columns:1fr}.statgrid{grid-template-columns:repeat(3,1fr)}}
  table.data{border-collapse:collapse;width:100%;font-size:12.5px}
  table.data th,table.data td{padding:6px 9px;border-bottom:1px solid var(--line);text-align:right;white-space:nowrap}
  table.data th:first-child,table.data td:first-child{text-align:left}
  table.data th{background:#f7fafd;color:var(--navy);font-weight:600}
  .chip{display:inline-block;padding:2px 9px;border-radius:20px;font-size:11px;font-weight:600;color:#fff}
  .empty{padding:30px;text-align:center;color:var(--mut)}
  .kv{display:flex;gap:6px;align-items:center}.kv label{font-size:12px;color:var(--mut)}
  textarea{width:100%;min-height:100px;font-family:var(--mono);font-size:12px;border:1px solid var(--line);border-radius:8px;padding:10px}
  .badge{font-family:var(--mono);font-size:11px;padding:3px 9px;border-radius:20px;border:1px solid var(--line);color:var(--mut)}
  .badge.live{color:var(--recovery);border-color:var(--recovery)}
</style>

function bucketColIds(){const ids=(M.bucketBy||[]).filter(id=>M.cols.some(c=>c.id===id&&(c.role==='regime'||c.role==='condition')));
  if(ids.length)return ids;const ri=regimeIdx();return ri>=0?[M.cols[ri].id]:[];}
/* ================= ENGINE ================= */
function buildSeries(){const di=dateIdx(),ri=regimeIdx(),etfs=etfCols(),cds=condCols();const out=[];
  M.rows.forEach(r=>{const date=normDate(di>=0?r[di]:'');if(!/^\d{4}-\d{2}$/.test(date))return;
    const prices={};let any=false;etfs.forEach(o=>{const v=pnum(r[o.i]);prices[o.c.id]=v;if(Number.isFinite(v))any=true;});if(!any)return;
    const cond={};cds.forEach(o=>cond[o.c.id]=(r[o.i]==null?'':r[o.i].toString().trim()));
    out.push({date,regime:ri>=0?(r[ri]==null?'':r[ri].toString().trim()):'',cond,prices});});
  out.sort((a,b)=>a.date<b.date?-1:1);return out;}
function compute(){RES=null;if(!M)return;migrate();const S=buildSeries();const etfs=etfCols();if(S.length<3||!etfs.length)return;
  const rets={};etfs.forEach(o=>{rets[o.c.id]=S.map((s,i)=>{if(i===0)return NaN;const p0=S[i-1].prices[o.c.id],p1=s.prices[o.c.id];return(Number.isFinite(p0)&&Number.isFinite(p1)&&p0>0)?p1/p0-1:NaN;});});
  const rf=(+M.rf||0)/100,minM=Math.max(1,+M.minMonths||1);
  if(M.mode==='algo'){computeAlgo(S,etfs,rets,rf,minM);return;}
  const bcols=bucketColIds();const keyOf=m=>{if(!bcols.length)return null;const parts=bcols.map(id=>(m.cond[id]||'').trim());if(parts.some(p=>p===''))return null;return parts.join(' · ');};
  const bm={};S.forEach(m=>{const k=keyOf(m);if(k!=null)(bm[k]=bm[k]||[]).push(m);});let buckets=Object.keys(bm);
  const bucketMeta={};buckets.forEach(k=>{const rep=bm[k][0].regime||k.split(' · ')[0];bucketMeta[k]={regime:rep,color:regimeColor(rep),n:bm[k].length};});
  const order=['recovery','goldilocks','latecycle','contraction','crisis','other'];
  buckets.sort((a,b)=>{const oa=order.indexOf(regimeKey(bucketMeta[a].regime)),ob=order.indexOf(regimeKey(bucketMeta[b].regime));return(oa-ob)||(a<b?-1:1);});
  const stats={};etfs.forEach(o=>{stats[o.c.id]={};buckets.forEach(k=>{const rs=[];S.forEach((m,i)=>{if(keyOf(m)===k&&Number.isFinite(rets[o.c.id][i]))rs.push(rets[o.c.id][i]);});stats[o.c.id][k]=statsOf(rs,rf);});stats[o.c.id].__all=statsOf(rets[o.c.id].filter(Number.isFinite),rf);});
  function pickFor(look){const bySleeve={};let ab=0;
    SLEEVES.forEach(sl=>{const rule=M.sleeveRules[sl]||{budget:0,topN:2,score:'sharpe',weight:'score'};
      const cand=etfs.filter(o=>o.c.sleeve===sl&&o.c.id!==M.benchId).map(o=>({id:o.c.id,name:o.c.name,st:look(o.c.id)||{n:0}})).filter(x=>x.st.n>=minM);
      cand.forEach(x=>x.score=scoreOf(x.st,rule.score));cand.sort((a,b)=>b.score-a.score);const picked=cand.slice(0,Math.max(1,+rule.topN||1));
      bySleeve[sl]=picked;if(picked.length)ab+=(+rule.budget||0);});
    const weights={};SLEEVES.forEach(sl=>{const rule=M.sleeveRules[sl];const picked=bySleeve[sl];if(!picked||!picked.length)return;
      const sb=(+rule.budget||0)/(ab||1);const mn=Math.min(0,...picked.map(p=>p.score));let ws=picked.map(p=>rule.weight==='equal'?1:Math.max(1e-4,p.score-mn+1e-4));const sum=ws.reduce((a,b)=>a+b,0);
      picked.forEach((p,k)=>{const w=sb*ws[k]/sum;weights[p.id]=w;p.w=w;});});return{weights,bySleeve};}
  function manualPort(k){const cfg=M.manual[k]||{};const sw=cfg.sw||{},picks=cfg.picks||{};const bySleeve={};let active=0;
    SLEEVES.forEach(sl=>{const p=picks[sl]||{};const list=Object.keys(p).filter(id=>etfs.some(o=>o.c.id===id&&o.c.sleeve===sl)).map(id=>({id,name:(M.cols.find(c=>c.id===id)||{}).name||id,ew:Math.max(0,+p[id]||0),w:0}));bySleeve[sl]=list;if(list.length&&(+sw[sl]||0)>0)active+=(+sw[sl]||0);});
    const weights={};SLEEVES.forEach(sl=>{const list=bySleeve[sl];if(!list.length||!(+sw[sl]>0))return;const share=(+sw[sl]||0)/(active||1);let ewsum=0;list.forEach(x=>ewsum+=x.ew);if(ewsum<=0){list.forEach(x=>x.ew=1);ewsum=list.length;}list.forEach(x=>{const w=share*x.ew/ewsum;weights[x.id]=w;x.w=w;});});return{weights,bySleeve};}
  const autoPorts={};buckets.forEach(k=>autoPorts[k]=pickFor(id=>stats[id][k]));
  const manualPorts={};buckets.forEach(k=>manualPorts[k]=manualPort(k));
  const ports=M.mode==='manual'?manualPorts:autoPorts;
  const regimes=[...new Set(S.map(m=>m.regime).filter(x=>x))];
  const statsReg={};etfs.forEach(o=>{statsReg[o.c.id]={};regimes.forEach(rg=>{const rs=[];S.forEach((m,i)=>{if(m.regime===rg&&Number.isFinite(rets[o.c.id][i]))rs.push(rets[o.c.id][i]);});statsReg[o.c.id][rg]=statsOf(rs,rf);});});
  const portsReg={};regimes.forEach(rg=>portsReg[rg]=M.mode==='manual'?manualPort(rg):pickFor(id=>statsReg[id][rg]));
  function blend(w,filt){const tw=Object.values(w).reduce((a,b)=>a+b,0);const series=[];S.forEach((m,i)=>{if(!filt(m,i))return;let acc=0,sw=0;for(const id in w){const r=rets[id][i];if(Number.isFinite(r)){acc+=w[id]*r;sw+=w[id];}}if(sw>0)series.push(acc/sw*tw);});return statsOf(series,rf);}
  const portStats={};buckets.forEach(k=>portStats[k]=blend(ports[k].weights,m=>keyOf(m)===k));
  const lag=M.lag?1:0;const stratR=[],dates=[];
  for(let i=1;i<S.length;i++){const src=S[Math.max(0,i-lag)];const k=keyOf(src);let w=(k!=null&&ports[k])?ports[k].weights:null;if(!w||!Object.keys(w).length){const rg=src.regime;if(rg&&portsReg[rg])w=portsReg[rg].weights;}
    let acc=0,sw=0,tw=0;if(w){tw=Object.values(w).reduce((a,b)=>a+b,0);for(const id in w){const r=rets[id][i];if(Number.isFinite(r)){acc+=w[id]*r;sw+=w[id];}}}stratR.push(sw>0?acc/sw*tw:0);dates.push(S[i].date);}
  let benchR=null;if(M.benchId&&rets[M.benchId]){benchR=[];for(let i=1;i<S.length;i++)benchR.push(Number.isFinite(rets[M.benchId][i])?rets[M.benchId][i]:0);}
  RES={S,rets,buckets,bucketMeta,stats,ports,portStats,stratR,benchR,dates,rf};}
function algoScoreFn(){const a=M.algo||{};try{return new Function('mom3','mom6','mom12','vol','dd','sharpe','ret1','"use strict";return ('+(a.formula||'mom12')+');');}catch(e){return null;}}
function computeAlgo(S,etfs,rets,rf,minM){const a=M.algo||{};const lb=Math.max(2,+a.lookback||12);const fn=algoScoreFn();const monthlyW=S.map(()=>null);
  for(let t=lb;t<S.length;t++){let active=0;const sp={};
    SLEEVES.forEach(sl=>{const cand=etfs.filter(o=>o.c.sleeve===sl&&o.c.id!==M.benchId).map(o=>{const m=metricsTrailing(rets[o.c.id],t,lb,rf);let sc;try{sc=fn?fn(m.mom3||0,m.mom6||0,m.mom12||0,m.vol||0,m.dd||0,m.sharpe||0,m.ret1||0):(m.mom12||0);}catch(e){sc=-1e9;}if(!Number.isFinite(sc))sc=-1e9;return{id:o.c.id,sc,vol:m.vol,n:m.n};}).filter(x=>x.n>=Math.min(lb,minM));
      const rule=M.sleeveRules[sl]||{topN:2,budget:0,weight:'score'};cand.sort((x,y)=>y.sc-x.sc);const picked=cand.slice(0,Math.max(1,+rule.topN||1));sp[sl]={picked,budget:+rule.budget||0,weight:rule.weight};if(picked.length&&(+rule.budget>0))active+=+rule.budget;});
    const w={};SLEEVES.forEach(sl=>{const o=sp[sl];if(!o.picked.length||!(o.budget>0))return;const share=o.budget/(active||1);let ws;if(o.weight==='equal')ws=o.picked.map(()=>1);else if(o.weight==='invvol')ws=o.picked.map(p=>1/Math.max(1e-4,p.vol||1e-4));else{const mn=Math.min(0,...o.picked.map(p=>p.sc));ws=o.picked.map(p=>Math.max(1e-4,p.sc-mn+1e-4));}const sum=ws.reduce((x,y)=>x+y,0);o.picked.forEach((p,k)=>w[p.id]=share*ws[k]/sum);});monthlyW[t]=w;}
  const stratR=[],dates=[];for(let i=1;i<S.length;i++){const w=monthlyW[i-1];let acc=0,sw=0,tw=0;if(w){tw=Object.values(w).reduce((x,y)=>x+y,0);for(const id in w){const r=rets[id][i];if(Number.isFinite(r)){acc+=w[id]*r;sw+=w[id];}}}stratR.push(sw>0?acc/sw*tw:0);dates.push(S[i].date);}
  let benchR=null;if(M.benchId&&rets[M.benchId]){benchR=[];for(let i=1;i<S.length;i++)benchR.push(Number.isFinite(rets[M.benchId][i])?rets[M.benchId][i]:0);}
  const regimes=[...new Set(S.map(m=>m.regime).filter(x=>x))];const order=['recovery','goldilocks','latecycle','contraction','crisis','other'];regimes.sort((x,y)=>order.indexOf(regimeKey(x))-order.indexOf(regimeKey(y)));
  const bucketMeta={};regimes.forEach(rg=>bucketMeta[rg]={regime:rg,color:regimeColor(rg),n:S.filter(m=>m.regime===rg).length});
  const stats={};etfs.forEach(o=>{stats[o.c.id]={};regimes.forEach(rg=>{const rs=[];S.forEach((m,i)=>{if(m.regime===rg&&Number.isFinite(rets[o.c.id][i]))rs.push(rets[o.c.id][i]);});stats[o.c.id][rg]=statsOf(rs,rf);});stats[o.c.id].__all=statsOf(rets[o.c.id].filter(Number.isFinite),rf);});
  const ports={};regimes.forEach(rg=>{const acc={};let mc=0;S.forEach((m,t)=>{if(m.regime!==rg||!monthlyW[t])return;mc++;const w=monthlyW[t];for(const id in w)acc[id]=(acc[id]||0)+w[id];});mc=mc||1;const weights={};const bySleeve={};SLEEVES.forEach(sl=>bySleeve[sl]=[]);for(const id in acc){const w=acc[id]/mc;weights[id]=w;const col=M.cols.find(c=>c.id===id);if(col&&col.sleeve&&bySleeve[col.sleeve])bySleeve[col.sleeve].push({id,name:col.name,w});}Object.keys(bySleeve).forEach(sl=>bySleeve[sl].sort((x,y)=>y.w-x.w));ports[rg]={weights,bySleeve};});
  const portStats={};regimes.forEach(rg=>{const rs=[];S.forEach((m,i)=>{if(i>0&&m.regime===rg)rs.push(stratR[i-1]);});portStats[rg]=statsOf(rs,rf);});
  RES={S,rets,buckets:regimes,bucketMeta,stats,ports,portStats,stratR,benchR,dates,rf};}
function statsOf(rs,rf){const n=rs.length;if(!n)return{ann:NaN,vol:NaN,sharpe:NaN,hit:NaN,mdd:NaN,n:0};
  const g=rs.reduce((p,c)=>p*(1+c),1);const ann=Math.pow(g,12/n)-1;const vol=std(rs)*Math.sqrt(12);const sharpe=vol>0?(ann-rf)/vol:0;const hit=rs.filter(x=>x>0).length/n;
  let peak=1,cum=1,mdd=0;rs.forEach(r=>{cum*=1+r;if(cum>peak)peak=cum;const dd=cum/peak-1;if(dd<mdd)mdd=dd;});return{ann,vol,sharpe,hit,mdd,n};}
function scoreOf(st,method){if(!st||!st.n)return-1e9;if(method==='return')return st.ann;if(method==='calmar')return st.mdd<0?st.ann/Math.abs(st.mdd):st.ann*3;return st.sharpe;}
function metricsOf(rs,benchR,rf){const n=rs.length;if(!n)return{cagr:NaN,vol:NaN,sharpe:NaN,mdd:NaN,calmar:NaN,info:NaN,n:0};
  const g=rs.reduce((p,c)=>p*(1+c),1);const cagr=Math.pow(g,12/n)-1;const vol=std(rs)*Math.sqrt(12);const sharpe=vol>0?(cagr-rf)/vol:0;
  let peak=1,cum=1,mdd=0;rs.forEach(r=>{cum*=1+r;if(cum>peak)peak=cum;const dd=cum/peak-1;if(dd<mdd)mdd=dd;});const calmar=mdd<0?cagr/Math.abs(mdd):(cagr>0?cagr*3:0);
  let info=NaN;if(benchR&&benchR.length===n){const act=rs.map((r,i)=>r-benchR[i]);const te=std(act)*Math.sqrt(12);info=te>0?(mean(act)*12)/te:0;}return{cagr,vol,sharpe,mdd,calmar,info,n};}
function metricsTrailing(arr,t,lb,rf){const win=[];for(let i=Math.max(1,t-lb+1);i<=t;i++)if(Number.isFinite(arr[i]))win.push(arr[i]);
  const cr=w=>{let g=1,k=0;for(let i=Math.max(1,t-w+1);i<=t;i++){if(Number.isFinite(arr[i])){g*=1+arr[i];k++;}}return k?g-1:NaN;};
  const vol=std(win)*Math.sqrt(12);let peak=1,cum=1,dd=0;win.forEach(r=>{cum*=1+r;if(cum>peak)peak=cum;const d=cum/peak-1;if(d<dd)dd=d;});
  const mom12=cr(lb);const sh=vol>0?((Math.pow(1+(isFinite(mom12)?mom12:0),12/Math.max(1,win.length))-1)-rf)/vol:0;
  return{mom3:cr(3),mom6:cr(6),mom12:mom12,vol:vol,dd:dd,sharpe:sh,ret1:Number.isFinite(arr[t])?arr[t]:0,n:win.length};}
/* ================= STRATEGIES ================= */
function migrate(){if(!M.sleeveRules){M.sleeveRules={};SLEEVES.forEach(s=>M.sleeveRules[s]={budget:s==='Anchor'?40:s==='Sector'?25:s==='Factor'?20:15,topN:2,score:'sharpe',weight:'score'});}
  if(!M.bucketBy)M.bucketBy=[];SLEEVES.forEach(s=>{if(!M.sleeveRules[s])M.sleeveRules[s]={budget:0,topN:2,score:'sharpe',weight:'score'};});
  if(!M.mode)M.mode='manual';if(!M.manual)M.manual={};if(!M.algo)M.algo={formula:'mom12 / vol',lookback:12,weight:'score'};
  if(!Array.isArray(M.strategies)||!M.strategies.length){const o={name:'Strategy 1'};SFIELDS.forEach(f=>o[f]=M[f]);M.strategies=[o];M.active=0;}
  if(M.active==null||M.active>=M.strategies.length)M.active=0;
  SFIELDS.forEach(f=>{if(M.strategies[M.active][f]==null)M.strategies[M.active][f]=M[f];M[f]=M.strategies[M.active][f];});}
function computeStrategies(){migrate();const cur=M.active;ALL=[];
  M.strategies.forEach((s,i)=>{SFIELDS.forEach(f=>M[f]=s[f]);M.active=i;compute();if(RES)ALL.push({name:s.name,i,color:STRATCOL[i%STRATCOL.length],stratR:RES.stratR.slice(),dates:RES.dates.slice(),benchR:RES.benchR?RES.benchR.slice():null,metrics:metricsOf(RES.stratR,RES.benchR,RES.rf)});});
  M.active=cur;SFIELDS.forEach(f=>M[f]=M.strategies[cur][f]);compute();}
/* ================= CHART HELPERS ================= */
function cumFrom(rs){let c=1;return rs.map(r=>{c*=1+r;return c;});}
function ddFrom(rs){let peak=1,cum=1;return rs.map(r=>{cum*=1+r;if(cum>peak)peak=cum;return cum/peak-1;});}
function idx100(rs){let c=1;return rs.map(r=>{c*=1+r;return c*100;});}
function niceLogTicks(mn,mx){const out=[];const mm=[1,1.5,2,3,5,7];for(let p=Math.floor(Math.log10(mn));p<=Math.ceil(Math.log10(mx));p++){const b=Math.pow(10,p);mm.forEach(k=>{const v=b*k;if(v>=mn*0.98&&v<=mx*1.02)out.push(v);});}return out.length?out:[mn,mx];}
function drawLineChart(elId,series,dates,opts){opts=opts||{};const el=document.getElementById(elId);if(!el)return;
  const n=dates.length;if(!n||!series.length||!series[0].data.length){el.innerHTML='<div class="empty">no data</div>';return;}
  const flat=[].concat(...series.map(s=>s.data));let mx=Math.max(...flat),mn=Math.min(...flat);if(opts.zeroBase){mx=Math.max(mx,0);mn=Math.min(mn,0);}if(mx===mn){mx+=1;mn-=1;}
  const log=opts.log&&mn>0;const tv=v=>log?Math.log(v):v;const T0=tv(mn),T1=tv(mx);
  const W=1160,H=opts.h||250,pL=52,pR=12,pT=10,pB=opts.regimeStrip?38:26,pw=W-pL-pR,ph=H-pT-pB;
  const x=i=>pL+(n<=1?pw/2:pw*i/(n-1)),y=v=>pT+ph*(1-(tv(v)-T0)/((T1-T0)||1));
  const fmt=g=>opts.fmt==='pct'?(g*100).toFixed(0)+'%':opts.fmt==='num'?Math.round(g):g.toFixed(2)+'x';
  let s='<svg class="chartsvg" viewBox="0 0 '+W+' '+H+'" width="100%" preserveAspectRatio="xMidYMid meet">';
  if(opts.regime&&RES&&RES.S){const m=RES.S.length;for(let i=1;i<m;i++){const rg=RES.S[i].regime;const rx=pL+pw*(i-1)/n;s+=`<rect x="${rx.toFixed(1)}" y="${pT}" width="${(pw/n+0.6).toFixed(1)}" height="${ph}" fill="${regimeColor(rg)}" opacity="0.06"/>`;}}
  const ticks=log?niceLogTicks(mn,mx):[mn,(mn+mx)/2,mx];
  ticks.forEach(g=>{const yy=y(g);s+=`<line x1="${pL}" y1="${yy.toFixed(1)}" x2="${W-pR}" y2="${yy.toFixed(1)}" stroke="${getVar('--line')}"/><text x="${pL-8}" y="${(yy+3).toFixed(1)}" font-size="10.5" fill="${getVar('--mut')}" text-anchor="end">${fmt(g)}</text>`;});
  let ly='';dates.forEach((d,i)=>{const yr=d.slice(0,4);if(yr!==ly&&(+yr%3===0)){ly=yr;s+=`<text x="${x(i).toFixed(0)}" y="${(pT+ph+16).toFixed(0)}" font-size="10.5" fill="${getVar('--mut')}" text-anchor="middle">${yr}</text>`;}});
  series.forEach(se=>{if(opts.fill){let a='M'+x(0).toFixed(1)+' '+y(se.data[0]).toFixed(1)+' ';se.data.forEach((v,i)=>{if(i)a+='L'+x(i).toFixed(1)+' '+y(v).toFixed(1)+' ';});const base=opts.zeroBase?0:mn;a+='L'+x(n-1).toFixed(1)+' '+y(base).toFixed(1)+' L'+x(0).toFixed(1)+' '+y(base).toFixed(1)+' Z';s+=`<path d="${a}" fill="${se.color}" opacity="0.10"/>`;}
    let d='';se.data.forEach((v,i)=>d+=(i?'L':'M')+x(i).toFixed(1)+' '+y(v).toFixed(1)+' ');s+=`<path d="${d}" fill="none" stroke="${se.color}" stroke-width="${se.w||1.8}"/>`;});
  if(opts.regimeStrip&&RES&&RES.S){const yy=pT+ph+22,hh=8,m=RES.S.length;s+=`<text x="${pL-8}" y="${yy+7}" font-size="9" fill="${getVar('--mut')}" text-anchor="end">REGIME</text>`;for(let i=1;i<m;i++){const rg=RES.S[i].regime;const rx=pL+pw*(i-1)/n;s+=`<rect x="${rx.toFixed(1)}" y="${yy}" width="${(pw/n+0.6).toFixed(1)}" height="${hh}" fill="${regimeColor(rg)}"/>`;}}
  s+='</svg>';el.innerHTML=s;}

    </div>
    <div class="card"><div class="sect">Behaviour in crises &amp; regimes</div><div id="crisisBox"></div></div>`;
  renderMetricsTable();renderSeriesToggles();renderCompare();renderBacktest();renderDrawdown();renderYearReturns();renderRelative();renderCrisis();
}
function renderSeriesToggles(){const el=document.getElementById('seriesToggles');if(!el)return;syncShow();
  let h='';ALL.forEach((s,i)=>{const on=SHOW.has('s'+i);h+=`<button class="${on?'':'off'}" onclick="toggleSeries('s${i}')"><span class="dot" style="background:${s.color}"></span>${esc(s.name)} <span class="val">${s.metrics.sharpe.toFixed(2)}</span></button>`;});
  const b=ALL.find(s=>s.benchR);if(b){const on=SHOW.has('bench');const bm=metricsOf(b.benchR,null,RES.rf);h+=`<button class="${on?'':'off'}" onclick="toggleSeries('bench')"><span class="dot" style="background:${getVar('--mut')}"></span>${esc(benchName())} <span class="val">${bm.sharpe.toFixed(2)}</span></button>`;}el.innerHTML=h;}
function renderMetricsTable(){const t=document.getElementById('metricsTable');if(!t)return;
  let best=-1,bs=-1e9;ALL.forEach((s,i)=>{if(Number.isFinite(s.metrics.sharpe)&&s.metrics.sharpe>bs){bs=s.metrics.sharpe;best=i;}});
  let h='<thead><tr><th>Strategy</th><th>CAGR</th><th>Vol</th><th>Sharpe</th><th>Max DD</th><th>Calmar</th><th>Info ratio</th><th>Index (100)</th></tr></thead><tbody>';
  ALL.forEach((s,i)=>{const m=s.metrics;const ix=idx100(s.stratR);const iv=ix.length?Math.round(ix[ix.length-1]):100;
    h+=`<tr class="${i===best?'reco':''}"><td><span class="row" style="gap:8px"><i style="width:12px;height:12px;border-radius:3px;background:${s.color};display:inline-block"></i>${esc(s.name)}${i===best?'<span class="recobadge">recommended</span>':''}</span></td><td><b>${(m.cagr*100).toFixed(1)}%</b></td><td>${(m.vol*100).toFixed(1)}%</td><td>${m.sharpe.toFixed(2)}</td><td style="color:var(--neg)">${(m.mdd*100).toFixed(1)}%</td><td>${m.calmar.toFixed(2)}</td><td>${Number.isFinite(m.info)?m.info.toFixed(2):'–'}</td><td><b>${iv}</b></td></tr>`;});
  const b=ALL.find(s=>s.benchR);if(b){const bm=metricsOf(b.benchR,null,RES.rf);const bi=idx100(b.benchR);const biv=bi.length?Math.round(bi[bi.length-1]):100;
    h+=`<tr style="border-top:2px solid var(--line)"><td><span class="row" style="gap:8px"><i style="width:12px;height:12px;border-radius:3px;background:${getVar('--mut')};display:inline-block"></i>${esc(benchName())}</span></td><td><b>${(bm.cagr*100).toFixed(1)}%</b></td><td>${(bm.vol*100).toFixed(1)}%</td><td>${bm.sharpe.toFixed(2)}</td><td style="color:var(--neg)">${(bm.mdd*100).toFixed(1)}%</td><td>${bm.calmar.toFixed(2)}</td><td>–</td><td><b>${biv}</b></td></tr>`;}t.innerHTML=h+'</tbody>';}
function renderCompare(){if(!ALL.length)return;const series=shownStrats().map(s=>({name:s.name,data:idx100(s.stratR),color:s.color}));const br=shownBenchR();if(br)series.push({name:benchName(),data:idx100(br),color:getVar('--mut'),w:1.3});
  drawLineChart('cmpChart',series,ALL[0].dates,{regime:true,regimeStrip:true,log:LOGSCALE,fmt:'num',h:340});}
function renderBacktest(){const m=metricsOf(RES.stratR,RES.benchR,RES.rf);const cards=[['CAGR',m.cagr,'%'],['Volatility',m.vol,'%'],['Sharpe',m.sharpe,''],['Max drawdown',m.mdd,'%'],['Calmar',m.calmar,''],['Info ratio',m.info,'']];
  const bsx=document.getElementById('btStats');if(bsx)bsx.innerHTML=cards.map(([l,v,u])=>`<div class="stat"><div class="v">${u==='%'?(v*100).toFixed(1)+'%':(Number.isFinite(v)?v.toFixed(2):'–')}</div><div class="l">${l}</div></div>`).join('');
  const series=shownStrats().map(s=>({name:s.name,data:idx100(s.stratR),color:s.color}));const br=shownBenchR();if(br)series.push({name:benchName(),data:idx100(br),color:getVar('--mut'),w:1.3});
  drawLineChart('btChart',series,ALL.length?ALL[0].dates:RES.dates,{regime:true,log:LOGSCALE,fmt:'num'});}
function renderDrawdown(){const series=shownStrats().map(s=>({name:s.name,data:ddFrom(s.stratR),color:s.color,w:1.6}));const br=shownBenchR();if(br)series.push({name:benchName(),data:ddFrom(br),color:getVar('--mut'),w:1.2});
  drawLineChart('ddChart',series,ALL.length?ALL[0].dates:RES.dates,{fmt:'pct',zeroBase:true,fill:true,h:230});}
function renderRelative(){const el=document.getElementById('relChart');if(!el)return;const b=ALL.find(s=>s.benchR);if(!b){el.innerHTML='<div class="empty">no benchmark selected</div>';return;}
  const cb=cumFrom(b.benchR);const series=shownStrats().map(s=>{const cs=cumFrom(s.stratR);return{name:s.name,data:cs.map((v,i)=>cb[i]?v/cb[i]:1),color:s.color};});if(!series.length){el.innerHTML='<div class="empty">select a strategy</div>';return;}
  drawLineChart('relChart',series,ALL[0].dates,{fmt:'x',h:230});}
function renderYearReturns(){const el=document.getElementById('yearChart');if(!el)return;
  const sers=shownStrats().map(s=>({name:s.name,color:s.color,r:s.stratR}));const br=shownBenchR();if(br)sers.push({name:benchName(),color:getVar('--mut'),r:br});if(!sers.length){el.innerHTML='<div class="empty">select a series</div>';return;}
  const dates=ALL[0].dates;const years=[...new Set(dates.map(d=>d.slice(0,4)))].sort();
  const val=sers.map(se=>{const o={};years.forEach(y=>o[y]=1);dates.forEach((d,i)=>o[d.slice(0,4)]*=1+se.r[i]);return o;});
  const flat=[];years.forEach(y=>val.forEach(o=>flat.push(o[y]-1)));const mx=Math.max(0.05,...flat),mn=Math.min(-0.05,...flat);
  const W=1160,H=220,pL=40,pR=10,pT=10,pB=24,pw=W-pL-pR,ph=H-pT-pB;const zero=pT+ph*(mx/((mx-mn)||1));const gw=pw/years.length;const bw=Math.max(1.2,(gw*0.82)/sers.length);
  let s='<svg class="chartsvg" viewBox="0 0 '+W+' '+H+'" width="100%">'+`<line x1="${pL}" y1="${zero.toFixed(1)}" x2="${W-pR}" y2="${zero.toFixed(1)}" stroke="${getVar('--mut')}"/>`;
  years.forEach((y,yi)=>{const x0=pL+gw*yi+gw*0.09;sers.forEach((se,si)=>{const v=val[si][y]-1;const bh=ph*(Math.abs(v)/((mx-mn)||1));const by=v>=0?zero-bh:zero;s+=`<rect x="${(x0+si*bw).toFixed(1)}" y="${by.toFixed(1)}" width="${(bw-0.4).toFixed(1)}" height="${Math.max(0.5,bh).toFixed(1)}" fill="${se.color}"><title>${esc(se.name)} ${y}: ${(v*100).toFixed(1)}%</title></rect>`;});if((+y)%2===0)s+=`<text x="${(pL+gw*yi+gw*0.5).toFixed(0)}" y="${H-6}" font-size="9" fill="${getVar('--mut')}" text-anchor="middle">${y.slice(2)}</text>`;});
  s+='</svg>';el.innerHTML=s;}
function renderCrisis(){const el=document.getElementById('crisisBox');if(!el)return;
  const regs=[...new Set(RES.S.map(m=>m.regime).filter(x=>x))];const order=['recovery','goldilocks','latecycle','contraction','crisis','other'];regs.sort((a,b)=>order.indexOf(regimeKey(a))-order.indexOf(regimeKey(b)));
  const byReg=rg=>{const s=[],b=[];RES.dates.forEach((d,i)=>{const m=RES.S[i+1];if(m&&m.regime===rg){s.push(RES.stratR[i]);if(RES.benchR)b.push(RES.benchR[i]);}});return{s,b};};
  const down=[],downB=[];RES.dates.forEach((d,i)=>{const m=RES.S[i+1];if(m&&/contraction|crisis/.test(regimeKey(m.regime))){down.push(RES.stratR[i]);if(RES.benchR)downB.push(RES.benchR[i]);}});
  let h='';if(down.length){const g=down.reduce((a,r)=>a*(1+r),1)-1;const gb=downB.length?downB.reduce((a,r)=>a*(1+r),1)-1:null;
    h+=`<div class="statgrid" style="grid-template-columns:repeat(3,1fr);margin-bottom:12px"><div class="stat"><div class="v" style="color:${g>=0?'var(--pos)':'var(--neg)'}">${(g*100).toFixed(0)}%</div><div class="l">Strategy total return in Contraction+Crisis (${down.length}m)</div></div>`+(gb!=null?`<div class="stat"><div class="v" style="color:${gb>=0?'var(--pos)':'var(--neg)'}">${(gb*100).toFixed(0)}%</div><div class="l">${esc(benchName())}, same months</div></div><div class="stat"><div class="v" style="color:${g-gb>=0?'var(--pos)':'var(--neg)'}">${((g-(gb||0))*100).toFixed(0)}%</div><div class="l">Out-performance in bad months</div></div>`:'')+`</div>`;}
  h+='<table class="data"><thead><tr><th>Regime</th><th>Months</th><th>Strategy (ann)</th><th>'+esc(benchName())+' (ann)</th><th>Strategy total growth</th></tr></thead><tbody>';
  regs.forEach(rg=>{const{s,b}=byReg(rg);if(!s.length)return;const ms=metricsOf(s,null,RES.rf);const mb=b.length?metricsOf(b,null,RES.rf):null;const grow=s.reduce((a,r)=>a*(1+r),1)-1;
    h+=`<tr><td style="text-align:left"><span class="chip" style="background:${regimeColor(rg)}">${esc(rg)}</span></td><td>${s.length}</td><td style="color:${ms.cagr>=0?'var(--pos)':'var(--neg)'}">${(ms.cagr*100).toFixed(0)}%</td><td>${mb?(mb.cagr*100).toFixed(0)+'%':'–'}</td><td style="color:${grow>=0?'var(--pos)':'var(--neg)'}">${(grow*100).toFixed(0)}%</td></tr>`;});
  h+='</tbody></table>';el.innerHTML=h;}
/* ================= BENCHMARK SELECTOR ================= */
function populateBench(){const sel=document.getElementById('benchSel');if(!sel||!M)return;const etfs=M.cols.filter(c=>c.role==='etf'||c.role==='benchmark');
  // prefer MSCI World / Anchor sleeve
  const opt=c=>`<option value="${c.id}"${c.id===M.benchId?' selected':''}>${esc(c.name)}${c.sleeve?' · '+c.sleeve:''}</option>`;
  sel.innerHTML=etfs.map(opt).join('');
  if(!etfs.some(c=>c.id===M.benchId)&&etfs.length){const pref=etfs.find(c=>/msci|world|urth|acwi/i.test(c.name))||etfs.find(c=>c.sleeve==='Anchor')||etfs[0];M.benchId=pref.id;sel.value=pref.id;}}
function setBench(id){M.benchId=id;try{localStorage.setItem('dash_bench',id);}catch(e){} recomputeAndRender();}
/* ================= DATA LOADING (LIVE) ================= */
function recomputeAndRender(){computeStrategies();render();}
function applyModel(m,src){ M=m; migrate();
  // benchmark is always MSCI World
  const w=M.cols.find(c=>/msci|world|urth/i.test(c.name)&&(c.role==='etf'||c.role==='benchmark'));
  if(w){M.cols.forEach(c=>{if(c.role==='benchmark')c.role='etf';});w.role='benchmark';M.benchId=w.id;}
  SRC=src; const si=document.getElementById('srcInfo'); if(si)si.textContent='source: '+src+' · '+(M.rows?M.rows.length:0)+' rows · '+new Date().toLocaleTimeString();
  recomputeAndRender(); }
async function loadData(){
  // 1) baked-in model (paste into EMBEDDED_MODEL above) — fully deterministic, works offline
  if(EMBEDDED_MODEL&&EMBEDDED_MODEL.trim()){try{FROZEN=true;applyModel(JSON.parse(EMBEDDED_MODEL),'embedded (frozen)');return;}catch(e){showNoData('Embedded model JSON is invalid: '+e.message);return;}}
  // 2) data.json committed next to this file (GitHub Pages) — deterministic for everyone
  try{const r=await fetch('./data.json',{cache:'no-store'});if(r.ok){applyModel(await r.json(),'data.json');return;}}catch(e){}
  // 3) live from the builder open in another tab of the same browser
  try{const ls=localStorage.getItem('rpb_model');if(ls){applyModel(JSON.parse(ls),'builder (localStorage, live)');return;}}catch(e){}
  showNoData();
}
function showNoData(msg){const o=document.getElementById('out');if(o)o.innerHTML='<div class="card"><div class="empty" style="padding:40px;line-height:1.7">'+(msg||'<b>No data loaded.</b><br>This dashboard no longer falls back to sample data. To make it show your model everywhere:<br>1) open the configurator, click <b>Export data.json</b>, and commit that <code>data.json</code> next to this file on GitHub, <b>or</b><br>2) click <b>Copy model JSON</b> in the configurator and paste it into the <code>EMBEDDED_MODEL</code> line near the top of this file.')+'</div></div>';const si=document.getElementById('srcInfo');if(si)si.textContent='no data';}
function loadPasted(){const t=document.getElementById('pasteJson').value.trim();if(!t){document.getElementById('dataMsg').textContent='paste JSON first';return;}
  try{applyModel(JSON.parse(t),'pasted JSON');document.getElementById('dataMsg').textContent='loaded';}catch(e){document.getElementById('dataMsg').textContent='invalid JSON: '+e.message;}}
function toggleDataPanel(){const p=document.getElementById('dataPanel');p.style.display=p.style.display==='none'?'':'none';}
function toggleLive(){LIVE=!LIVE;const b=document.getElementById('liveBtn');b.classList.toggle('on',LIVE);b.textContent=(LIVE?'● ':'○ ')+'LIVE';
  if(LIVE){startLive();}else{clearInterval(POLL);POLL=null;}}
function startLive(){ clearInterval(POLL);
  POLL=setInterval(()=>{ if(FROZEN)return; try{const ls=localStorage.getItem('rpb_model');if(ls){const m=JSON.parse(ls);const sig=JSON.stringify(m).length;if(sig!==window._sig){window._sig=sig;applyModel(m,'builder (localStorage, live)');}}}catch(e){} },1500); }
window.addEventListener('storage',e=>{ if(!FROZEN&&LIVE&&e.key==='rpb_model'&&e.newValue){try{applyModel(JSON.parse(e.newValue),'builder (localStorage, live)');}catch(err){}} });
/* ================= SAMPLE ================= */
function loadSampleData(){
  const defs=[['TLT','Anchor',{recovery:0.001,goldilocks:0.001,latecycle:-0.004,contraction:0.010,other:0.001},0.035],
    ['IEF','Anchor',{recovery:0.001,goldilocks:0.002,latecycle:-0.001,contraction:0.006,other:0.001},0.018],
    ['MTUM','Factor',{recovery:0.016,goldilocks:0.012,latecycle:0.004,contraction:-0.014,other:0.006},0.045],
    ['VTV','Factor',{recovery:0.013,goldilocks:0.008,latecycle:0.007,contraction:-0.010,other:0.006},0.042],
    ['XLE','Sector',{recovery:0.010,goldilocks:0.006,latecycle:0.018,contraction:-0.012,other:0.004},0.060],
    ['XLK','Sector',{recovery:0.020,goldilocks:0.015,latecycle:0.002,contraction:-0.016,other:0.007},0.055],
    ['XLP','Sector',{recovery:0.006,goldilocks:0.007,latecycle:0.008,contraction:0.001,other:0.005},0.030],
    ['QQQ','Thematic',{recovery:0.019,goldilocks:0.014,latecycle:0.003,contraction:-0.015,other:0.007},0.052],
    ['MSCI_World','Thematic',{recovery:0.013,goldilocks:0.010,latecycle:0.004,contraction:-0.011,other:0.005},0.040]];
  const cols=[{id:'d',name:'Date',role:'date',sleeve:null},{id:'rg',name:'Regime',role:'regime',sleeve:null}];
  const ids={};defs.forEach(dd=>{const id=cuid();ids[dd[0]]=id;cols.push({id,name:dd[0],role:dd[0]==='MSCI_World'?'benchmark':'etf',sleeve:dd[1]});});
  const benchId=ids['MSCI_World'];
  function regimeAt(k){const y=2005+Math.floor(k/12);if(y<=2006)return'Goldilocks';if(y===2007)return'Late-cycle';if(y===2008)return'Contraction';if(y===2009||y===2010)return'Recovery';if(y<=2015)return'Goldilocks';if(y===2016)return'Contraction';if(y<=2018)return'Recovery';if(y===2019)return'Late-cycle';if(y===2020&&(k%12)<4)return'Contraction';if(y===2020||y===2021)return'Recovery';return'Late-cycle';}
  const price={};defs.forEach(dd=>price[dd[0]]=100);let seed=11;const rnd=()=>{seed=(seed*1103515245+12345)&0x7fffffff;return seed/0x7fffffff;};
  const rows=[];const N=(2026-2005)*12+6;
  for(let k=0;k<N;k++){const y=2005+Math.floor(k/12),mo=(k%12)+1;const rg=regimeAt(k),rk=regimeKey(rg);const row=[y+'-'+String(mo).padStart(2,'0'),rg];
    defs.forEach(dd=>{const drift=dd[2][rk]!==undefined?dd[2][rk]:dd[2].other;const r=drift+(rnd()-0.5)*dd[3]*2;price[dd[0]]*=(1+r);row.push(price[dd[0]].toFixed(2));});rows.push(row);}
  const sr={};SLEEVES.forEach(s=>sr[s]={budget:s==='Anchor'?40:s==='Sector'?25:s==='Factor'?20:15,topN:2,score:s==='Sector'?'return':'sharpe',weight:'score'});
  const mk=(n,mode,algo)=>({name:n,mode,manual:{},sleeveRules:JSON.parse(JSON.stringify(sr)),bucketBy:[],algo:algo||{formula:'mom12 / vol',lookback:12,weight:'score'}});
  const m={cols,rows,benchId,rf:0,minMonths:6,lag:true,active:0,strategies:[mk('Auto rules','auto'),mk('Momentum','algo',{formula:'mom6 + mom12',lookback:12,weight:'score'})]};
  applyModel(m,'sample');}
/* ================= BOOT ================= */
loadData(); startLive();
